workflows:
  android-build:
    name: Fabricar INSPECTOR PRO 3
    environment:
      flutter: stable
    scripts:
      - name: Generar herramientas V4
        script: |
          rm -rf android
          flutter create --org com.example.v4 --platforms android .
          rm -rf android/app/src/main/kotlin/*
          rm -rf android/app/src/main/java/*
          mkdir -p android/app/src/main/kotlin/com/example/v4/inspector_pro_v4
          
          if [ -f android/app/build.gradle.kts ]; then
            echo 'dependencies { implementation("com.google.android.gms:play-services-location:21.1.0") }' >> android/app/build.gradle.kts
          else
            echo "dependencies { implementation 'com.google.android.gms:play-services-location:21.1.0' }" >> android/app/build.gradle
          fi
          
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.v4.inspector_pro_v4">
              
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.CAMERA" />
              
              <application
                  android:label="INSPECTOR PRO 3"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.SEND" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <data android:mimeType="text/*" />
                      </intent-filter>
                  </activity>
                  
                  <service
                      android:name=".MockLocationService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="location" />
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                      
              </application>
          </manifest>
          EOF
          
          cat << 'EOF' > android/app/src/main/kotlin/com/example/v4/inspector_pro_v4/MainActivity.kt
          package com.example.v4.inspector_pro_v4

          import android.app.AppOpsManager
          import android.content.Context
          import android.content.Intent
          import android.os.Build
          import android.os.Bundle
          import androidx.annotation.NonNull
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity: FlutterActivity() {
              private val CHANNEL = "mock_location_channel"
              private var sharedText: String? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  handleIntent(intent)
              }

              override fun onNewIntent(intent: Intent) {
                  super.onNewIntent(intent)
                  intent.addFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP)
                  setIntent(intent) 
                  handleIntent(intent)
              }

              private fun handleIntent(intent: Intent) {
                  if (Intent.ACTION_SEND == intent.action && intent.type != null) {
                      if (intent.type!!.startsWith("text/")) { 
                          sharedText = intent.getStringExtra(Intent.EXTRA_TEXT)
                      }
                  }
              }

              override fun configureFlutterEngine(@NonNull flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      when (call.method) {
                          "getSharedText" -> {
                              result.success(sharedText)
                              sharedText = null
                          }
                          "startMocking" -> {
                              val latStr = call.argument<String>("lat")
                              val lngStr = call.argument<String>("lng")
                              
                              if (latStr != null && lngStr != null) {
                                  if (!isMockAppSelected()) {
                                      result.error("PERMISSION_DENIED", "La app no esta seleccionada en Opciones de Desarrollador", null)
                                      return@setMethodCallHandler
                                  }

                                  val serviceIntent = Intent(this, MockLocationService::class.java)
                                  serviceIntent.putExtra("latStr", latStr)
                                  serviceIntent.putExtra("lngStr", lngStr)
                                  
                                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                      startForegroundService(serviceIntent)
                                  } else {
                                      startService(serviceIntent)
                                  }
                                  result.success(null)
                              } else {
                                  result.error("INVALID_ARGS", "Faltan coordenadas", null)
                              }
                          }
                          "stopMocking" -> {
                              val serviceIntent = Intent(this, MockLocationService::class.java)
                              stopService(serviceIntent)
                              result.success(null)
                          }
                          "openTimeSettings" -> {
                              try {
                                  val intent = Intent(android.provider.Settings.ACTION_DATE_SETTINGS)
                                  intent.flags = Intent.FLAG_ACTIVITY_NEW_TASK
                                  startActivity(intent)
                                  result.success(true)
                              } catch (e: Exception) {
                                  result.error("INTENT_ERROR", "Error", null)
                              }
                          }
                          else -> result.notImplemented()
                      }
                  }
              }

              private fun isMockAppSelected(): Boolean {
                  var isMockLocation = false
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                          val opsManager = getSystemService(Context.APP_OPS_SERVICE) as AppOpsManager
                          isMockLocation = opsManager.checkOp(
                              AppOpsManager.OPSTR_MOCK_LOCATION,
                              android.os.Process.myUid(),
                              packageName
                          ) == AppOpsManager.MODE_ALLOWED
                      } else {
                          isMockLocation = android.provider.Settings.Secure.getString(
                              contentResolver,
                              "mock_location_app"
                          ) == packageName
                      }
                  } catch (e: Exception) {
                      return false
                  }
                  return isMockLocation
              }
          }
          EOF
          
          cat << 'EOF' > android/app/src/main/kotlin/com/example/v4/inspector_pro_v4/MockLocationService.kt
          package com.example.v4.inspector_pro_v4

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.location.Location
          import android.location.LocationManager
          import android.os.Build
          import android.os.Bundle
          import android.os.Handler
          import android.os.IBinder
          import android.os.Looper
          import android.os.PowerManager
          import android.os.SystemClock
          import android.util.Log
          import androidx.core.app.NotificationCompat
          import com.google.android.gms.location.FusedLocationProviderClient
          import com.google.android.gms.location.LocationServices
          import java.math.BigDecimal
          import java.math.RoundingMode
          import java.util.Random

          class MockLocationService : Service() {
              private lateinit var fusedLocationClient: FusedLocationProviderClient
              private var mockHandler = Handler(Looper.getMainLooper())
              private var mockRunnable: Runnable? = null
              private var wakeLock: PowerManager.WakeLock? = null
              private val random = Random()

              override fun onCreate() {
                  super.onCreate()
                  // Solo inicializamos FusedLocation. Adiós LocationManager.
                  fusedLocationClient = LocationServices.getFusedLocationProviderClient(this)
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val baseLatStr = intent?.getStringExtra("latStr") ?: "0.0"
                  val baseLngStr = intent?.getStringExtra("lngStr") ?: "0.0"
                  val baseLat = baseLatStr.toDouble()
                  val baseLng = baseLngStr.toDouble()
                  
                  val powerManager = getSystemService(Context.POWER_SERVICE) as PowerManager
                  wakeLock = powerManager.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "InspectorPro::WakeLock")
                  wakeLock?.acquire(10 * 60 * 1000L) // Seguro anti-bloqueos: 10 minutos máximo
                  
                  val channelId = "inspector_v4_channel"
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(channelId, "Servicio GPS Blindado", NotificationManager.IMPORTANCE_LOW)
                      getSystemService(NotificationManager::class.java).createNotificationChannel(channel)
                  }
                  
                  val notification = NotificationCompat.Builder(this, channelId)
                      .setContentTitle("INSPECTOR PRO 3 Activo")
                      .setContentText("Evasión sensorial y jitter activados...")
                      .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                      .build()
                  
                  startForeground(1, notification)
                  
                  try { fusedLocationClient.setMockMode(true) } catch (e: Exception) { Log.e("MockLocationService", "Error mockMode", e) }

                  mockRunnable = object : Runnable {
                      override fun run() {
                          // Evasión térmica y de movimiento (Jitter)
                          val jitterLat = (random.nextDouble() - 0.5) * 0.000010
                          val jitterLng = (random.nextDouble() - 0.5) * 0.000010
                          val exactLat = BigDecimal(baseLat + jitterLat).setScale(7, RoundingMode.HALF_UP).toDouble()
                          val exactLng = BigDecimal(baseLng + jitterLng).setScale(7, RoundingMode.HALF_UP).toDouble()

                          val mockLocation = Location(LocationManager.GPS_PROVIDER)
                          
                          mockLocation.latitude = exactLat
                          mockLocation.longitude = exactLng
                          mockLocation.altitude = 10.0
                          mockLocation.speed = 0.1f + random.nextFloat() * 0.4f
                          mockLocation.bearing = random.nextFloat() * 360f
                          
                          mockLocation.time = System.currentTimeMillis()
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.JELLY_BEAN_MR1) {
                              mockLocation.elapsedRealtimeNanos = SystemClock.elapsedRealtimeNanos()
                          }
                          
                          mockLocation.accuracy = 1.0f 
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              mockLocation.verticalAccuracyMeters = 1.0f
                              mockLocation.speedAccuracyMetersPerSecond = 0.1f
                              mockLocation.bearingAccuracyDegrees = 1.0f
                          }

                          // Inyección puramente en FusedLocation
                          try {
                              fusedLocationClient.setMockLocation(mockLocation)
                          } catch (e: Exception) { Log.e("MockLocationService", "Error inyectando fused", e) }

                          val delay = 800L + random.nextInt(400).toLong()
                          mockHandler.postDelayed(this, delay)
                      }
                  }
                  mockHandler.post(mockRunnable!!)
                  
                  return START_STICKY
              }

              override fun onDestroy() {
                  mockRunnable?.let { mockHandler.removeCallbacks(it) }
                  
                  // Limpieza nuclear de la caché de Google Maps al apagar
                  try { 
                      fusedLocationClient.flushLocations()
                      fusedLocationClient.setMockMode(false) 
                  } catch (e: Exception) { Log.e("MockLocationService", "Error destroy mockMode", e) }
                  
                  if (wakeLock?.isHeld == true) { wakeLock?.release() }
                  super.onDestroy()
              }

              override fun onBind(intent: Intent?): IBinder? = null
          }
          EOF
          
      - name: Compilar APK Final V4
        script: |
          cat << 'EOF' > android/app/lint.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <lint>
              <issue id="MockLocation" severity="ignore" />
          </lint>
          EOF
          # LA CLAVE DEL EXITO: Compilar en RELEASE para que Android lo respete
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
