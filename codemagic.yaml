workflows:
  android-build:
    name: Fabricar APK
    environment:
      flutter: stable
    scripts:
      - name: Generar herramientas del horno
        script: |
          rm -rf android
          flutter create --platforms android .
          rm -rf android/app/src/main/kotlin/*
          rm -rf android/app/src/main/java/*
          mkdir -p android/app/src/main/kotlin/com/example/mock_gps_app
          
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_MOCK_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Mock GPS"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name="com.example.mock_gps_app.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
          
          cat << 'EOF' > android/app/src/main/kotlin/com/example/mock_gps_app/MainActivity.kt
          package com.example.mock_gps_app

          import android.content.Context
          import android.content.Intent
          import android.location.Location
          import android.location.LocationManager
          import android.os.Build
          import android.os.SystemClock
          import android.os.Handler
          import android.os.Looper
          import androidx.annotation.NonNull
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity: FlutterActivity() {
              
              private val CHANNEL = "mock_location_channel"
              private var locationManager: LocationManager? = null
              
              private var mockHandler: Handler? = null
              private var mockRunnable: Runnable? = null
              
              // ARREGLO 1: Fuera el "fused", nos quedamos con los reales de Android
              private val providers = arrayOf(
                  LocationManager.GPS_PROVIDER, 
                  LocationManager.NETWORK_PROVIDER
              )

              override fun configureFlutterEngine(@NonNull flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  locationManager = getSystemService(Context.LOCATION_SERVICE) as LocationManager

                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      when (call.method) {
                          "startMocking" -> {
                              val lat = call.argument<Double>("lat")
                              val lng = call.argument<Double>("lng")
                              
                              if (lat != null && lng != null) {
                                  val success = startMockLocation(lat, lng)
                                  if (success) {
                                      result.success(null)
                                  } else {
                                      result.error("PERMISSION_DENIED", "Permiso denegado por Android", null)
                                  }
                              } else {
                                  result.error("INVALID_ARGS", "Lat o Lng es nulo", null)
                              }
                          }
                          "stopMocking" -> {
                              stopMockLocation()
                              result.success(null)
                          }
                          "openTimeSettings" -> {
                              try {
                                  val intent = Intent(android.provider.Settings.ACTION_DATE_SETTINGS)
                                  intent.flags = Intent.FLAG_ACTIVITY_NEW_TASK
                                  startActivity(intent)
                                  result.success(true)
                              } catch (e: Exception) {
                                  result.error("INTENT_ERROR", "No se pudo abrir la configuracion", null)
                              }
                          }
                          else -> {
                              result.notImplemented()
                          }
                      }
                  }
              }

              // Lógica impecable de reseteo
              private fun setupMockProvider(provider: String) {
                  try {
                      locationManager?.removeTestProvider(provider)
                  } catch (e: Exception) {
                      // Ignorar si no existe
                  }

                  try {
                      locationManager?.addTestProvider(
                          provider,
                          false, false, false, false,
                          true, true, true,
                          0, 5
                      )
                      locationManager?.setTestProviderEnabled(provider, true)
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }

              private fun startMockLocation(lat: Double, lng: Double): Boolean {
                  stopMockLocation() 

                  for (provider in providers) {
                      setupMockProvider(provider)
                  }

                  mockHandler = Handler(Looper.getMainLooper())
                  mockRunnable = object : Runnable {
                      override fun run() {
                          for (provider in providers) {
                              try {
                                  val mockLocation = Location(provider)
                                  mockLocation.latitude = lat
                                  mockLocation.longitude = lng
                                  mockLocation.altitude = 10.0
                                  mockLocation.time = System.currentTimeMillis()
                                  mockLocation.accuracy = 0.5f
                                  mockLocation.speed = 0.0f
                                  mockLocation.bearing = 0.0f
                                  
                                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.JELLY_BEAN_MR1) {
                                      mockLocation.elapsedRealtimeNanos = SystemClock.elapsedRealtimeNanos()
                                  }
                                  
                                  // ARREGLO 2: Eliminado el chivato de isMock = true
                                  
                                  locationManager?.setTestProviderLocation(provider, mockLocation)
                              } catch (e: Exception) {
                                  e.printStackTrace()
                              }
                          }
                          
                          // Latido variable (Jitter)
                          val interval = (800..1200).random().toLong()
                          mockHandler?.postDelayed(this, interval)
                      }
                  }
                  
                  mockHandler?.post(mockRunnable!!)
                  
                  return true
              }

              private fun stopMockLocation() {
                  mockHandler?.removeCallbacksAndMessages(null)
                  mockRunnable = null
                  mockHandler = null
                  
                  for (provider in providers) {
                      try {
                          locationManager?.removeTestProvider(provider)
                      } catch (e: Exception) {
                          e.printStackTrace()
                      }
                  }
              }
              
              override fun onDestroy() {
                  stopMockLocation()
                  super.onDestroy()
              }
          }
          EOF
          
      - name: Desactivar alarmas y compilar APK final
        script: |
          cat << 'EOF' > android/app/lint.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <lint>
              <issue id="MockLocation" severity="ignore" />
          </lint>
          EOF
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
