workflows:
  android-build:
    name: Fabricar APK
    environment:
      flutter: stable
    scripts:
      - name: Generar herramientas del horno
        script: |
          rm -rf android
          flutter create --platforms android .
          rm -rf android/app/src/main/kotlin/*
          rm -rf android/app/src/main/java/*
          mkdir -p android/app/src/main/kotlin/com/example/mock_gps_app
          
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_MOCK_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Mock GPS"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name="com.example.mock_gps_app.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
          
          cat << 'EOF' > android/app/src/main/kotlin/com/example/mock_gps_app/MainActivity.kt
          package com.example.mock_gps_app

          import android.content.Context
          import android.content.Intent
          import android.location.Location
          import android.location.LocationManager
          import android.os.Build
          import android.os.SystemClock
          import androidx.annotation.NonNull
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import java.util.Timer
          import java.util.TimerTask

          class MainActivity: FlutterActivity() {
              
              private val CHANNEL = "mock_location_channel"
              private var locationManager: LocationManager? = null
              private var mockTimer: Timer? = null

              override fun configureFlutterEngine(@NonNull flutterEngine: FlutterEngine) {
                  
                  super.configureFlutterEngine(flutterEngine)
                  
                  locationManager = getSystemService(Context.LOCATION_SERVICE) as LocationManager

                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      
                      when (call.method) {
                          
                          "startMocking" -> {
                              val lat = call.argument<Double>("lat")
                              val lng = call.argument<Double>("lng")
                              
                              if (lat != null && lng != null) {
                                  startMockLocation(lat, lng)
                                  result.success(null)
                              } else {
                                  result.error("INVALID_ARGS", "Lat o Lng es nulo", null)
                              }
                          }
                          
                          "stopMocking" -> {
                              stopMockLocation()
                              result.success(null)
                          }
                          
                          "openTimeSettings" -> {
                              try {
                                  val intent = Intent(android.provider.Settings.ACTION_DATE_SETTINGS)
                                  intent.flags = Intent.FLAG_ACTIVITY_NEW_TASK
                                  startActivity(intent)
                                  result.success(true)
                              } catch (e: Exception) {
                                  result.error("INTENT_ERROR", "No se pudo abrir la configuracion", null)
                              }
                          }
                          
                          else -> {
                              result.notImplemented()
                          }
                      }
                  }
              }

              private fun startMockLocation(lat: Double, lng: Double) {
                  
                  stopMockLocation() 

                  try {
                      locationManager?.addTestProvider(
                          LocationManager.GPS_PROVIDER,
                          false, 
                          false, 
                          false, 
                          false, 
                          true, 
                          true, 
                          true, 
                          0, 
                          5
                      )
                      locationManager?.setTestProviderEnabled(LocationManager.GPS_PROVIDER, true)
                  } catch (e: SecurityException) {
                      e.printStackTrace()
                      return
                  } catch (e: IllegalArgumentException) {
                      // El proveedor ya existe
                  }

                  mockTimer = Timer()
                  mockTimer?.scheduleAtFixedRate(object : TimerTask() {
                      override fun run() {
                          try {
                              val mockLocation = Location(LocationManager.GPS_PROVIDER)
                              mockLocation.latitude = lat
                              mockLocation.longitude = lng
                              mockLocation.altitude = 10.0
                              mockLocation.time = System.currentTimeMillis()
                              mockLocation.accuracy = 1.0f
                              
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.JELLY_BEAN_MR1) {
                                  mockLocation.elapsedRealtimeNanos = SystemClock.elapsedRealtimeNanos()
                              }
                              
                              locationManager?.setTestProviderLocation(LocationManager.GPS_PROVIDER, mockLocation)
                          } catch (e: Exception) {
                              e.printStackTrace()
                          }
                      }
                  }, 0, 1000)
              }

              private fun stopMockLocation() {
                  
                  if (mockTimer != null) {
                      mockTimer?.cancel()
                      mockTimer = null
                  }
                  
                  try {
                      locationManager?.removeTestProvider(LocationManager.GPS_PROVIDER)
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }
              
              override fun onDestroy() {
                  
                  stopMockLocation()
                  super.onDestroy()
                  
              }
          }
          EOF
          
      - name: Desactivar alarmas y compilar APK final
        script: |
          cat << 'EOF' > android/app/lint.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <lint>
              <issue id="MockLocation" severity="ignore" />
          </lint>
          EOF
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
